workdir: ./workdir
download_workdir: ./workdir

# For a first step1 run, you only need to adjust the `video` section below.
# The remaining sections are for step2-step4.
video:
  url: https://www.youtube.com/watch?v=YOUR_VIDEO_ID
  download_video: true
  playlist_items: null
  auth_method: none
  cookies_from_browser:
  cookies_file:
  fetch_pot: auto
  pot_provider: none
  pot_base_url: http://127.0.0.1:4416
  # Set this explicitly if you use pot_provider=bgutil_http.
  bgutil_provider_root:
  pot_script_path:
  pot_disable_innertube: false
  po_token: []
  jsc_trace: false
  player_client:
    - mweb
    - web_safari
    - tv
  fallback_clients:
    - tv
    - web_safari
    - mweb
    - android
    - default
    - web
  fallback_formats:
    - bestvideo[height<=1080]+bestaudio/best[height<=1080]/bestvideo+bestaudio/best
    - bestvideo+bestaudio/best
    - best
  print_formats_on_fail: true
  rate_limit:
    min_sleep_interval: 10
    max_sleep_interval: 20
    sleep_requests: 1.0
    download_rate:
  cloud_line_batch_size: 50
  local_line_batch_size: 20

services:
  # Public default path: Gemini.
  translation: gemini
  segmentation: rule

models:
  grok:
    name: grok-4
  gemini:
    # Keep this name in sync with the model provider's current naming.
    translate: gemini-3-flash-preview
    # Keep this name in sync with the model provider's current naming.
    segmentation: gemini-3-flash-preview
  vertex:
    # Keep this name in sync with the model provider's current naming.
    translate: gemini-3-flash-preview
    # Keep this name in sync with the model provider's current naming.
    segmentation: gemini-3-flash-preview
  local:
    api_base_url: http://localhost:11434/v1
    api_key: ollama
    translate: qwen3:30b
    segmentation: qwen3:30b
    timeout: 150
    context_length: 8192
    show_thinking: false
    top_p: 0.5
    enable_two_stage: true
    window_size: 40
    overlap: 10
    stage1_temperature: 0.2
    stage2_temperature: 0.7
  deepseek:
    api_base_url: https://api.deepseek.com/v1
    translate: deepseek-chat
    segmentation: deepseek-chat

temperatures:
  translate_cloud: 0.5
  translate_local: 0.5
  segmentation: 0.1

translation_context:
  enabled: false
  force_regenerate: false
  file_name: translation_context.txt
  source_max_chars: 12000

segmentation:
  pause_threshold: 0.4
  min_segment_length: 15
  max_segment_length: 65

asr:
  language: en
  alignment_language: en
  # small: CPU or <= 8GB VRAM
  # medium: recommended default for 8-12GB VRAM
  # large-v3: 16GB+ VRAM
  model_name: medium
  device: auto
  compute_type: auto
  batch_size: auto
  hf_token_env: HF_TOKEN
  use_vocal_separation: false
  snr_threshold: 20.0
  speaker_diarization: false
  min_speakers:
  max_speakers:

render:
  # Optional absolute path to a TTF/TTC font file used by drawtext.
  # Leave empty to rely on platform-appropriate font family names.
  font_path:
  font_family_en: DejaVu Sans
  font_family_cn: Noto Sans CJK SC
  subtitle_font_size_en: 13
  subtitle_font_size_cn: 22
  ffmpeg_bin: ffmpeg
  ffprobe_bin: ffprobe
  # auto: prefer h264_nvenc when available, otherwise fall back to libx264
  video_codec: auto
  video_preset: slow
  video_crf: 20
  output_suffix: Done_
